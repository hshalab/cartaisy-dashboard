name: Feature / implementation task
description: Plan a dashboard implementation change with Cartaisy safety checks.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for dashboard implementation work. Keep scope small and do not treat planned SaaS features as implemented unless verified in code.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Cartaisy context
      description: How does this fit merchant onboarding, store setup, Shopify, branding, home modules, or release readiness?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, merchant, admin, or technical problem are we solving?
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Required changes
      description: List the concrete files, screens, routes, or contracts expected to change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Name what must not change in this issue.
      placeholder: Runtime scope boundaries, auth behavior, Shopify credentials, publishing behavior, package files, etc.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: checkboxes
    id: impacts
    attributes:
      label: Impact checklist
      description: Check every area touched or needing explicit verification.
      options:
        - label: Auth/session impact
        - label: Store ownership/tenant impact
        - label: Backend API contract impact
        - label: Shopify credentials/secrets impact
        - label: Merchant onboarding impact
        - label: Branding/theme impact
        - label: Home module publishing impact
  - type: textarea
    id: impact_notes
    attributes:
      label: Impact details
      description: Explain checked impacts, or write "None verified" with reasoning. Do not expose Shopify Admin/private credentials in frontend code.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests required
      description: What tests or manual checks should prove the change?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Commands the implementer should run, or "Docs-only/no runtime validation" if applicable.
      placeholder: |
        npm run build
        npm run test:api
    validations:
      required: true
  - type: textarea
    id: docs_read
    attributes:
      label: Docs to read before work
      value: |
        - AGENTS.md
        - CARTAISY_CONTEXT.md
        - docs/ARCHITECTURE.md
        - docs/STATUS.md
        - docs/DECISIONS.md
        - docs/TESTING.md
        - docs/DASHBOARD_ONBOARDING_FLOW.md
        - docs/HOME_MODULE_EDITOR_CONTRACT.md
    validations:
      required: true
  - type: textarea
    id: docs_update
    attributes:
      label: Docs to update
      description: List docs that must change if architecture, product assumptions, or behavior changes.
      placeholder: None, or list files.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Links, screenshots, API examples, or constraints.
